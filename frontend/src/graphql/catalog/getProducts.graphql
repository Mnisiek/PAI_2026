query GetProducts($filter: ProductFilter) {
  offersModule {
    products(filter: $filter) {
      total
      items {
        id
        slug
        name
        description
        mainImageUrl
        priceFrom {
          amount
          currency
        }
        offers {
          id
          sku
          price {
            amount
            currency
          }
          stock
          status
          attributes {
            code
            name
            dataType
            unit
            textValue
            numValue
            boolValue
          }
        }
        brand {
          id
          name
          slug
        }
        category {
          id
          name
          slug
          parentId
          isLeaf
        }
      }
    }
  }
}
