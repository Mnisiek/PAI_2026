# In-memory mock GraphQL mirroring the backend's offers contract (+ auth), served
# via SchemaLink. Real activity events go to the backend API, not this mock.
#
# Deviation from the backend: Category exposes `parentId` (the backend models the
# tree via parent_id internally but exposes parent/children) to keep the mock's
# category filtering simple.

type Money {
  amount: Float!
  currency: String!
}

type Brand {
  id: ID!
  name: String!
  slug: String!
}

enum AttributeDataType {
  TEXT
  NUMBER
  BOOL
}

type AttributeValue {
  code: String!
  name: String!
  dataType: AttributeDataType!
  unit: String
  textValue: String
  numValue: Float
  boolValue: Boolean
}

type Spec {
  key: String!
  value: String!
}

type Offer {
  id: ID!
  sku: String!
  price: Money!
  stock: Int!
  status: String!
  attributes: [AttributeValue!]!
}

type Category {
  id: ID!
  name: String!
  slug: String!
  parentId: ID
  isLeaf: Boolean!
  children: [Category!]!
}

type Product {
  id: ID!
  slug: String!
  name: String!
  description: String!
  mainImageUrl: String!
  brand: Brand
  category: Category!
  priceFrom: Money!
  offers: [Offer!]!
  specs: [Spec!]!
}

input ProductFilter {
  categorySlug: String
}

type ProductPage {
  items: [Product!]!
  total: Int!
  page: Int!
  size: Int!
  hasNext: Boolean!
}

type OffersModuleQuery {
  product(slug: ID!): Product
  products(search: String, filter: ProductFilter): ProductPage!
  category(slug: ID!): Category
  rootCategories: [Category!]!
}

type User {
  id: ID!
  name: String!
  email: String!
}

type AuthPayload {
  token: String!
  user: User!
}

input LoginInput {
  email: String!
  password: String!
}

type Query {
  offersModule: OffersModuleQuery!
}

type Mutation {
  login(input: LoginInput!): AuthPayload!
}
