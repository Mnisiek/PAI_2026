# Infrastructure stack — data stores only (Postgres, ClickHouse, Valkey).
# Run the backend and frontend on your host against these:
#   docker compose -f docker/infra/docker-compose.yml up -d
#
# The full containerised app lives in the repo-root docker-compose.yml, which
# `include`s this file so the infra services are defined in exactly one place.
services:
  postgres:
    image: postgres:15-alpine
    container_name: pai-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shop_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d shop_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: pai-clickhouse
    environment:
      - CLICKHOUSE_USER=user
      - CLICKHOUSE_PASSWORD=password
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      # Schema bootstrap — runs only on first init (empty data dir).
      - ../../clickhouse/init:/docker-entrypoint-initdb.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user $$CLICKHOUSE_USER --password $$CLICKHOUSE_PASSWORD --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # Valkey (OSS Redis fork) — 9.0+ for per-hash-field TTL (HEXPIRE).
  valkey:
    image: valkey/valkey:9.0-alpine
    container_name: pai-valkey
    command: ["valkey-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
  clickhouse_data:
  valkey_data:
