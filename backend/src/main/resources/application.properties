spring.application.name=backend

# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/shop_db
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# GraphQL
# GraphiQL playground UI, served at http://localhost:8080/graphiql
spring.graphql.graphiql.enabled=true
# Expose the generated SDL at http://localhost:8080/graphql/schema
spring.graphql.schema.printer.enabled=true

# ClickHouse (activity event sink) — written asynchronously, off the request thread
clickhouse.url=jdbc:clickhouse://localhost:8123/activity_db
clickhouse.username=user
clickhouse.password=password
clickhouse.flush-interval-ms=1000

# Valkey (user retargeting state) — Redis-protocol compatible, so spring.data.redis.* applies
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Per-field TTL: each category/product interest ages out this long after its last touch
retargeting.ttl-days=30

# Per-category popular-offers cache (Valkey), sourced from ClickHouse engagement.
popular.cache-ttl-minutes=60
popular.window-days=30
